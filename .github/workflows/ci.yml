name: FOUDY CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  backend-lint-and-test:
    name: Backend CI
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: foudy_user
          POSTGRES_PASSWORD: foudy_password
          POSTGRES_DB: foudy_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install flake8 pytest pytest-django
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 backend/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
    - name: Check Django Migrations
      env:
        DATABASE_URL: postgres://foudy_user:foudy_password@localhost:5432/foudy_db
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test_secret_key_for_ci
      run: |
        cd backend
        python manage.py makemigrations --check --dry-run
    - name: Run Tests
      env:
        DATABASE_URL: postgres://foudy_user:foudy_password@localhost:5432/foudy_db
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test_secret_key_for_ci
      run: |
        cd backend
        pytest

  frontend-lint-and-build:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
    - name: Run Linter
      working-directory: ./frontend
      run: npm run lint
    - name: Typecheck
      working-directory: ./frontend
      run: npm run typecheck
    - name: Build Validation
      working-directory: ./frontend
      run: npm run build

  deploy-to-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [backend-lint-and-test, frontend-lint-and-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - name: Trigger Render deploy
      run: |
        curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
          -H "Content-Type: application/json" \
          --fail \
          --retry 3
      env:
        RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
